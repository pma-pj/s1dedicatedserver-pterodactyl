name: Build and publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build smoke test
        run: |
          docker build -t s1ds-ptero-smoke-test .
          docker run --rm --user 996:994 --entrypoint /bin/bash s1ds-ptero-smoke-test -lc '
            id
            test -r /usr/local/bin/pterodactyl-entrypoint.sh
            test -x /usr/local/bin/pterodactyl-entrypoint.sh
            test -r /usr/local/bin/s1ds-run.sh
            test -x /usr/local/bin/s1ds-run.sh
            grep -q /home/container/steamcmd /usr/local/bin/s1ds-run.sh
          '

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
